name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.3)"
        required: true
        type: string
      draft:
        description: "Publish as draft release"
        required: false
        default: false
        type: boolean
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION_NAME="${TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "${VERSION_NAME}"
          VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "${KEYSTORE_BASE64}" ]; then
            echo "::error::Missing KEYSTORE_BASE64 secret. Run scripts/setup-signing.sh once to create the signing key and secrets."
            exit 1
          fi
          echo "${KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/release.jks"
          echo "KEYSTORE_FILE=${RUNNER_TEMP}/release.jks" >> "$GITHUB_ENV"

      - name: Build release APK
        env:
          VERSION_CODE: ${{ steps.tag.outputs.version_code }}
          VERSION_NAME: ${{ steps.tag.outputs.version_name }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APK
        id: apk
        run: |
          APK_SRC=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "${APK_SRC}" ]; then
            echo "::error::No release APK was produced."
            exit 1
          fi
          case "${APK_SRC}" in
            *unsigned*)
              echo "::error::APK is unsigned (${APK_SRC}). Signing config did not apply — check the signing secrets."
              exit 1
              ;;
          esac
          APK_NAME="airgradient-${{ steps.tag.outputs.version_name }}.apk"
          cp "${APK_SRC}" "${APK_NAME}"
          echo "path=${APK_NAME}" >> "$GITHUB_OUTPUT"

      - name: Verify APK signature
        run: |
          BUILD_TOOLS="$(find "${ANDROID_HOME:-$ANDROID_SDK_ROOT}/build-tools" -maxdepth 1 -type d | sort | tail -1)"
          "${BUILD_TOOLS}/apksigner" verify --verbose --print-certs "${{ steps.apk.outputs.path }}"

      - name: Clean up keystore
        if: always()
        run: rm -f "${RUNNER_TEMP}/release.jks"

      - name: Generate release notes
        id: notes
        run: |
          # Extract commits since the previous tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          if [ -n "${PREV_TAG}" ]; then
            NOTES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            NOTES=$(git log --pretty=format:"- %s" --no-merges | head -20)
          fi
          {
            echo "notes<<EOF"
            echo "${NOTES}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "AirGradient ${{ steps.tag.outputs.version_name }}"
          body: |
            ## Changes

            ${{ steps.notes.outputs.notes }}

            ## Installation

            Download `${{ steps.apk.outputs.path }}` and install on your Android device (minSdk 26 / Android 8.0+).
            You may need to enable *Install unknown apps* for your file manager or browser.
          draft: ${{ inputs.draft || false }}
          prerelease: ${{ inputs.prerelease || false }}
          files: ${{ steps.apk.outputs.path }}
          fail_on_unmatched_files: true
