name: Android

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Android app
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run unit tests, lint, and static analysis
        run: ./gradlew test ktlintCheck detekt lint

      - name: Package instrumentation tests
        run: ./gradlew assembleDebugAndroidTest

      - name: Build release artifact
        run: ./gradlew assembleRelease

      - name: Upload debug instrumentation APK
        uses: actions/upload-artifact@v4
        with:
          name: airgradient-debug-android-test
          path: app/build/outputs/apk/androidTest/debug/*.apk
          if-no-files-found: error

      - name: Upload unsigned release APK
        uses: actions/upload-artifact@v4
        with:
          name: airgradient-release-unsigned
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
