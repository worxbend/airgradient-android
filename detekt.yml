complexity:
  LongMethod:
    active: true
    threshold: 80
  LongParameterList:
    active: true
    functionThreshold: 8
    constructorThreshold: 8

naming:
  FunctionNaming:
    active: true
    ignoreAnnotated:
      - Composable

style:
  MaxLineLength:
    active: true
    maxLineLength: 120
  MagicNumber:
    active: false
  UnusedPrivateMember:
    active: true
    ignoreAnnotated:
      - Preview
